<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Documentation Viewer</title>

  <!-- Markdown parser and Syntax Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: rgba(18, 25, 51, 0.6);
      --text: #eaf0ff;
      --muted: #a6b3d1;
      --accent: #7aa2ff;
      --accent-2: #72e5c6;
      --danger: #ff9d9d;
      --border: rgba(255, 255, 255, 0.12);
      --glass: rgba(11, 16, 32, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #18244d 0%, var(--bg) 60%);
      background-attachment: fixed;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 320px;
      background: var(--glass);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
      color: var(--accent-2);
    }

    .mobile-menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        padding: 16px;
      }

      .sidebar-header h2 {
        margin-bottom: 8px;
      }

      .mobile-menu-btn {
        display: block;
      }

      .file-list {
        display: none;
        max-height: 250px;
      }

      .file-list.open {
        display: block;
      }

      .topbar {
        padding: 0 20px;
      }

      .markdown-body {
        padding: 24px 20px 80px 20px;
      }

      .markdown-body h1 {
        font-size: 32px;
      }

      .markdown-body h2 {
        font-size: 24px;
      }
    }

    .back-btn {
      display: inline-block;
      text-decoration: none;
      color: var(--muted);
      font-size: 14px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--text);
    }

    .file-list {
      list-style: none;
      padding: 12px;
      margin: 0;
      overflow-y: auto;
      flex-grow: 1;
    }

    .file-item {
      padding: 12px 16px;
      margin-bottom: 4px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.2s ease;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .file-item:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .file-item.active {
      background: rgba(122, 162, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(122, 162, 255, 0.3);
    }

    .file-item.active:before {
      opacity: 1;
    }

    /* Main Content */
    .content-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .topbar {
      height: 64px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      background: var(--glass);
      -webkit-backdrop-filter: blur(20px);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .file-title {
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .markdown-body {
      padding: 40px 60px 80px 60px;
      overflow-y: auto;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      height: calc(100vh - 64px);
      line-height: 1.6;
      font-size: 17px;
    }

    /* Markdown Styling */
    .markdown-body h1 {
      font-size: 42px;
      margin-top: 0;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      line-height: 1.2;
    }

    .markdown-body h2 {
      font-size: 28px;
      margin-top: 40px;
      margin-bottom: 16px;
      color: var(--accent-2);
    }

    .markdown-body h3 {
      font-size: 22px;
      margin-top: 32px;
      color: var(--text);
    }

    .markdown-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(122, 162, 255, 0.4);
      transition: all 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent);
    }

    .markdown-body p,
    .markdown-body li {
      color: #d1d9e8;
    }

    .markdown-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 3px 6px;
      border-radius: 6px;
      font-size: 14px;
      color: #ffb8b8;
    }

    .markdown-body pre {
      background: #0d1224;
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      margin: 24px 0;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .markdown-body pre code {
      background: none;
      padding: 0;
      color: inherit;
      font-size: 15px;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 24px 0;
    }

    .markdown-body th,
    .markdown-body td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .markdown-body th {
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      color: var(--accent-2);
    }

    .markdown-body blockquote {
      margin: 24px 0;
      padding: 16px 24px;
      border-left: 4px solid var(--accent);
      background: rgba(122, 162, 255, 0.05);
      border-radius: 0 8px 8px 0;
    }

    /* Loader */
    .loader {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: translate(-50%, -50%) rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div>
        <h2>Project Docs</h2>
        <a href="index.html" class="back-btn">← Back to Presentation</a>
      </div>
      <button class="mobile-menu-btn" onclick="document.getElementById('fileList').classList.toggle('open')">☰</button>
    </div>
    <ul class="file-list" id="fileList">
      <!-- List populated by JS -->
    </ul>
  </aside>

  <main class="content-area">
    <div class="topbar">
      <span class="file-title" id="currentFileTitle">Select a document</span>
    </div>
    <div class="loader" id="loader"></div>
    <div class="markdown-body" id="content">
      <div
        style="height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; color: var(--muted); opacity: 0.6;">
        <p>Select a markdown file from the sidebar to view its contents.</p>
      </div>
    </div>
  </main>

  <script>
    const fallbackMarkdownFiles = [
      'data-source-notes.md',
      'experimental-design.md',
      'label-mapping.md',
      'meeting-task-checklist.md',
      'normalized-schema.md',
      'presentation-brief.md',
      'reproducibility.md',
      'visualisation.md',
      'sources.md',
      'notes/quick_notes.md',
      'notes/Notes for Peiling Discussion.md'
    ];

    const fileListEl = document.getElementById('fileList');
    const contentEl = document.getElementById('content');
    const titleEl = document.getElementById('currentFileTitle');
    const loaderEl = document.getElementById('loader');

    let availableFiles = [];

    function normalizeFilePath(file) {
      return file.replace(/^\.\//, '').replace(/^\//, '');
    }

    function uniqueFiles(files) {
      return [...new Set(files.map(normalizeFilePath))];
    }

    function formatTitleSegment(segment) {
      return segment
        .replace(/\.md$/i, '')
        .replace(/[_-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\b\w/g, char => char.toUpperCase());
    }

    function getDisplayName(file) {
      const segments = normalizeFilePath(file).split('/').map(formatTitleSegment);
      return segments.join(' / ');
    }

    async function getDirectories() {
      const dirs = ['.'];
      try {
        const response = await fetch('.');
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const links = doc.querySelectorAll('a');
        links.forEach(link => {
          const href = link.getAttribute('href');
          if (href && href.endsWith('/') && href !== '../' && href !== './') {
            dirs.push(href);
          }
        });
      } catch (err) {
        console.warn('Could not read directories. Falling back to the bundled markdown file list.');
      }
      return dirs;
    }

    async function getMarkdownFiles() {
      const files = [];
      const directories = await getDirectories();

      for (const dir of directories) {
        try {
          const response = await fetch(dir);
          const text = await response.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(text, 'text/html');
          const links = doc.querySelectorAll('a');
          links.forEach(link => {
            const href = link.getAttribute('href');
            if (href && href.endsWith('.md')) {
              files.push(dir === '.' ? href : `${dir}${href}`);
            }
          });
        } catch (err) {
          console.warn(`Could not read directory ${dir}.`);
        }
      }

      return uniqueFiles([...fallbackMarkdownFiles, ...files]);
    }

    // Configure marked to use highlight.js for code blocks
    marked.setOptions({
      highlight: function (code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true
    });

    // Initialize sidebar
    async function initSidebar() {
      availableFiles = await getMarkdownFiles();
      fileListEl.innerHTML = '';

      availableFiles.forEach(file => {
        const li = document.createElement('li');
        li.className = 'file-item';
        const displayName = getDisplayName(file);
        li.textContent = displayName;
        li.onclick = () => loadFile(file, li, displayName);
        fileListEl.appendChild(li);
      });

      if (!availableFiles.length) {
        fileListEl.innerHTML = '<li class="file-item">No markdown files found</li>';
        return;
      }

      // Check URL for specific file
      const urlParams = new URLSearchParams(window.location.search);
      const fileToLoad = urlParams.get('file');

      if (fileToLoad && availableFiles.includes(fileToLoad)) {
        const itemIndex = availableFiles.indexOf(fileToLoad);
        const li = fileListEl.children[itemIndex];
        li.click();
      } else if (availableFiles.length > 0) {
        // Load first file by default
        fileListEl.children[0].click();
      }
    }

    // Load and render markdown file
    async function loadFile(filename, element, displayName) {
      // Update UI state
      document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
      if (element) element.classList.add('active');
      titleEl.textContent = displayName;

      // Update URL without reloading
      const newUrl = new URL(window.location);
      newUrl.searchParams.set('file', filename);
      window.history.pushState({}, '', newUrl);

      // Hide mobile menu if open
      document.getElementById('fileList').classList.remove('open');

      // Fetch and render
      contentEl.style.opacity = '0.5';
      loaderEl.style.display = 'block';

      try {
        const response = await fetch(encodeURI(filename));
        if (!response.ok) throw new Error('File not found');
        const text = await response.text();

        // Render markdown
        contentEl.innerHTML = marked.parse(text);

        // Scroll to top
        contentEl.scrollTop = 0;
      } catch (err) {
        contentEl.innerHTML = `
          <div style="color: var(--danger); text-align: center; margin-top: 100px;">
            <h3>Failed to load document</h3>
            <p>${err.message}</p>
            <p style="font-size: 14px; opacity: 0.7;">Make sure you are running this through a web server (or GitHub Pages), as local file:// requests for fetch() might be blocked by CORS.</p>
          </div>
        `;
      } finally {
        contentEl.style.opacity = '1';
        loaderEl.style.display = 'none';
      }
    }

    // Run on load
    initSidebar();

    // Handle back/forward browser buttons
    window.addEventListener('popstate', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const file = urlParams.get('file');
      if (file && availableFiles.includes(file)) {
        const itemIndex = availableFiles.indexOf(file);
        const li = fileListEl.children[itemIndex];
        const displayName = li.textContent;
        loadFile(file, li, displayName);
      }
    });
  </script>
</body>

</html>
